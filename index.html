<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#15130F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Forge — Daily Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15130F; --surface:#211D17; --surface-2:#2B261E; --line:rgba(242,233,218,0.10);
    --text:#F2E9DA; --muted:#9A9080;
    --ember-1:#FF6A2B; --ember-2:#FFB23E;
    --steel-1:#4FA6BE; --steel-2:#7FD0E0; --done:#8FB573;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100dvh;overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(120% 80% at 50% -10%, rgba(255,106,43,0.08), transparent 55%),
      radial-gradient(100% 60% at 50% 110%, rgba(79,166,190,0.06), transparent 60%);}
  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:22px 20px 40px;min-height:100dvh;display:flex;flex-direction:column;}
  .eyebrow{font-family:'Oswald';text-transform:uppercase;letter-spacing:.28em;font-weight:500;font-size:.72rem;color:var(--muted);}
  h1{font-family:'Oswald';font-weight:600;letter-spacing:.01em;line-height:.95;}

  .home-head{margin-bottom:26px;}
  .home-head .mark{display:flex;align-items:baseline;gap:.5ch;margin-top:6px;}
  .home-head h1{font-size:3.4rem;}
  .home-head .mark span{font-family:'Oswald';font-weight:300;font-size:1.1rem;color:var(--ember-2);letter-spacing:.2em;text-transform:uppercase;}
  .lede{color:var(--muted);font-size:.95rem;line-height:1.5;margin-top:14px;max-width:34ch;}
  .pick{display:flex;flex-direction:column;gap:14px;margin-top:30px;}
  .card-btn{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:18px;padding:22px;text-align:left;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:18px;transition:border-color .2s,transform .1s;}
  .card-btn:active{transform:scale(.985);}
  .card-btn .ico{width:46px;height:46px;flex:none;border-radius:12px;display:grid;place-items:center;}
  .ico.fire{background:linear-gradient(135deg,var(--ember-1),var(--ember-2));}
  .ico.wave{background:linear-gradient(135deg,var(--steel-1),var(--steel-2));}
  .ico svg{width:24px;height:24px;}
  .card-btn .t{font-family:'Oswald';font-weight:600;font-size:1.35rem;letter-spacing:.02em;}
  .card-btn .s{color:var(--muted);font-size:.85rem;margin-top:2px;display:block;}
  .foot{margin-top:auto;padding-top:30px;color:var(--muted);font-size:.78rem;line-height:1.5;}
  .foot b{color:var(--text);font-weight:600;}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;}
  .topbar .back{background:none;border:none;color:var(--muted);font-family:'Oswald';text-transform:uppercase;letter-spacing:.18em;font-size:.74rem;cursor:pointer;padding:6px 0;}
  .topbar .phase{font-family:'Oswald';text-transform:uppercase;letter-spacing:.22em;font-size:.74rem;color:var(--muted);text-align:right;}
  .progress-track{height:4px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-bottom:24px;}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ember-1),var(--ember-2));transition:width .35s ease;}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;}
  .ring-box{position:relative;width:280px;max-width:78vw;aspect-ratio:1;margin:4px 0 6px;}
  .ring-box svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-track{fill:none;stroke:var(--surface-2);stroke-width:14;}
  .ring-prog{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset .3s linear;filter:drop-shadow(0 0 10px rgba(255,106,43,.45));}
  .ring-prog.steel{filter:drop-shadow(0 0 10px rgba(79,166,190,.5));}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px;}
  .ring-num{font-family:'Oswald';font-weight:600;font-size:5.4rem;line-height:.9;font-variant-numeric:tabular-nums;}
  .ring-sub{font-family:'Oswald';text-transform:uppercase;letter-spacing:.24em;font-size:.8rem;color:var(--muted);margin-top:10px;}

  .ex-name{font-family:'Oswald';font-weight:600;font-size:2rem;text-align:center;line-height:1.02;margin-top:6px;}
  .ex-target{font-family:'Oswald';font-weight:400;color:var(--ember-2);letter-spacing:.03em;text-align:center;font-size:1rem;margin-top:5px;}
  .ex-target.steel{color:var(--steel-2);}
  .ex-cue{color:var(--muted);font-size:.92rem;line-height:1.5;text-align:center;margin-top:13px;max-width:31ch;min-height:2.6em;}
  .dots{display:flex;gap:9px;justify-content:center;margin-top:14px;}
  .dot{width:12px;height:12px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);transition:background .2s,transform .2s;}
  .dot.done{background:linear-gradient(135deg,var(--ember-1),var(--ember-2));border-color:transparent;}
  .dot.cur{transform:scale(1.25);box-shadow:0 0 10px rgba(255,106,43,.6);}

  .controls{display:flex;flex-direction:column;gap:12px;margin-top:22px;}
  .row{display:flex;gap:12px;}
  .btn{appearance:none;border:none;cursor:pointer;font-family:'Oswald';font-weight:600;letter-spacing:.06em;text-transform:uppercase;border-radius:15px;padding:18px 20px;font-size:1.05rem;flex:1;transition:transform .1s;color:#1a1611;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:linear-gradient(135deg,var(--ember-1),var(--ember-2));}
  .btn.steel{background:linear-gradient(135deg,var(--steel-1),var(--steel-2));}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line);}
  .btn.done{background:linear-gradient(135deg,#7BA85F,var(--done));}
  .btn.wide{flex:1;}

  .setup{margin-top:6px;}
  .setup h2{font-family:'Oswald';font-weight:600;font-size:1.7rem;margin-bottom:4px;}
  .setup .note{color:var(--muted);font-size:.9rem;line-height:1.5;margin-bottom:8px;}
  .lbl{font-family:'Oswald';text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;color:var(--muted);margin:20px 0 9px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text);font-family:'Oswald';font-size:1.05rem;padding:14px 20px;border-radius:11px;cursor:pointer;min-width:62px;font-variant-numeric:tabular-nums;}
  .chip.on{background:var(--surface-2);border-color:var(--ember-2);color:var(--ember-2);}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;appearance:none;border:1px solid var(--line);background:var(--surface);color:var(--text);font-family:'Oswald';text-transform:uppercase;letter-spacing:.08em;font-size:.9rem;padding:14px;border-radius:12px;cursor:pointer;}
  .seg button.on{background:linear-gradient(135deg,var(--steel-1),var(--steel-2));color:#10171a;border-color:transparent;}
  .plan{margin-top:14px;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .plan .r{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid var(--line);font-size:.9rem;}
  .plan .r:last-child{border-bottom:none;}
  .plan .r .n{font-family:'Oswald';font-weight:500;letter-spacing:.02em;}
  .plan .r .d{color:var(--muted);font-variant-numeric:tabular-nums;font-family:'Oswald';}
  .hidden{display:none!important;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
  @media (max-height:680px){.ring-box{width:220px;}.ring-num{font-size:4.4rem;}.ex-cue{min-height:0;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
"use strict";

/* ---------------- DATA ---------------- */
const WARMUP = [
  {name:'Arm circles + shoulder rolls', sec:30, cue:'Loosen the shoulders — circle both directions.', say:'Arm circles'},
  {name:'Hip hinges', sec:30, cue:'Push the hips back, soft knees, flat back.', say:'Hip hinges'},
  {name:'Bodyweight squats', sec:30, cue:'Sit between the hips, knees out, chest tall.', say:'Bodyweight squats'},
  {name:'Halos — light bell', sec:40, cue:'Circle the bell around your head. Slow, 5 each way.', say:'Halos'},
  {name:'Feeler swings', sec:40, cue:'Easy effort. Find the hinge and let the bell float.', say:'Feeler swings'},
];
const CIRCUIT = [
  {name:'Two-hand swing', say:'Swings', work:50, guide:'≈18–22 swings', cue:'Snap the hips — the bell floats. Stand tall at the top.'},
  {name:'Goblet squat', say:'Goblet squats', work:50, guide:'≈10–14 reps', cue:'Chest tall. Sit between the hips, drive through the floor.'},
  {name:'Turkish get-up', say:'Get ups', work:75, guide:'1 each side · slow', cue:'Your breather. Eyes on the bell, elbow locked — don’t rush it.'},
  {name:'Standing press', say:'Press', work:50, guide:'≈4–6 each arm', cue:'Wrist over elbow, ribs down. Full lockout, control it down.'},
  {name:'Bent-over row', say:'Rows', work:50, guide:'≈6–10 each arm', cue:'Flat back. Pull to the hip, lead with the elbow, squeeze.'},
];
const TRANSITION = 15, ROUNDREST = 60;
const RING_R = 130, CIRC = 2*Math.PI*RING_R;

/* ---------------- AUDIO + VOICE ---------------- */
let actx=null;
function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
function beep(freq=660,dur=0.16,type='sine',gain=0.18){ if(!actx)return;
  try{ const o=actx.createOscillator(),g=actx.createGain(); o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
    const t=actx.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t);o.stop(t+dur+0.02);}catch(e){} }
const beepTick=()=>beep(520,0.08,'sine',0.12);
const beepGo=()=>{ beep(440,0.1,'square',0.14); setTimeout(()=>beep(720,0.18,'square',0.16),110); };
const beepRest=()=>beep(360,0.18,'sine',0.13);
const beepDone=()=>{ beep(660,0.12); setTimeout(()=>beep(880,0.16),140); setTimeout(()=>beep(1100,0.22),300); };
function speak(text){
  if(!state.voice||!text) return;
  try{ if('speechSynthesis' in window){ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.rate=1.0; u.pitch=1.0; u.volume=1; speechSynthesis.speak(u); } }catch(e){}
}

/* ---------------- WAKE LOCK ---------------- */
let wakeLock=null;
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
function releaseAwake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&state.screen!=='home'&&!wakeLock) keepAwake(); });

/* ---------------- TIMER ---------------- */
let ticker=null,tEnd=0,tTotal=0,tRemaining=0,tPaused=false,countBeeps=[];
function startTimer(seconds,onTick,onDone){
  stopTimer(); tTotal=seconds; tRemaining=seconds; tPaused=false; tEnd=Date.now()+seconds*1000;
  onTick&&onTick(seconds,tTotal); scheduleBeeps(seconds);
  ticker=setInterval(()=>{ if(tPaused)return; const rem=Math.max(0,(tEnd-Date.now())/1000); tRemaining=rem;
    onTick&&onTick(Math.ceil(rem),tTotal); if(rem<=0){ stopTimer(); onDone&&onDone(); } },100);
}
function scheduleBeeps(seconds){ clearBeeps(); for(let s=1;s<=3;s++){ if(seconds>=s) countBeeps.push(setTimeout(()=>{ if(!tPaused)beepTick(); },(seconds-s)*1000)); } }
function clearBeeps(){ countBeeps.forEach(clearTimeout); countBeeps=[]; }
function pauseTimer(){ if(!ticker)return false; tPaused=!tPaused; if(tPaused){ tRemaining=Math.max(0,(tEnd-Date.now())/1000); clearBeeps(); }
  else { tEnd=Date.now()+tRemaining*1000; scheduleBeeps(tRemaining); } return tPaused; }
function stopTimer(){ if(ticker){ clearInterval(ticker); ticker=null; } clearBeeps(); tPaused=false; }

/* ---------------- STATE ---------------- */
const state={ screen:'home', voice:true, rounds:3, timeline:[], segIdx:0,
  cardioType:'steady', cMin:20, cWork:60, cRest:30, cRounds:8, cPhase:'work', cRound:1 };

/* ---------------- UI HELPERS ---------------- */
const app=document.getElementById('app');
function fmt(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60),ss=s%60; return m>0?`${m}:${String(ss).padStart(2,'0')}`:`${ss}`; }
function setRing(frac,steel){ const p=document.getElementById('ringProg'); if(!p)return;
  p.style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,frac))); p.setAttribute('stroke',steel?'url(#gradSteel)':'url(#gradEmber)'); p.classList.toggle('steel',!!steel); }
function ringSVG(){ return `<svg viewBox="0 0 300 300" aria-hidden="true"><defs>
  <linearGradient id="gradEmber" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--ember-1)"/><stop offset="1" stop-color="var(--ember-2)"/></linearGradient>
  <linearGradient id="gradSteel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--steel-1)"/><stop offset="1" stop-color="var(--steel-2)"/></linearGradient></defs>
  <circle class="ring-track" cx="150" cy="150" r="${RING_R}"></circle>
  <circle id="ringProg" class="ring-prog" cx="150" cy="150" r="${RING_R}" stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" stroke="url(#gradEmber)"></circle></svg>`; }

/* ---------------- HOME ---------------- */
function renderHome(){
  stopTimer(); releaseAwake(); state.screen='home';
  app.innerHTML=`
    <div class="home-head">
      <div class="eyebrow">Daily Coach</div>
      <div class="mark"><h1>FORGE</h1><span>4-week build</span></div>
      <p class="lede">Short, heavy, submaximal. Move at a strong pace and let the clock end each station — don't sprint it. Pick today's work.</p>
    </div>
    <div class="pick">
      <button class="card-btn" id="goCircuit">
        <span class="ico fire"><svg viewBox="0 0 24 24" fill="none" stroke="#1a1611" stroke-width="2"><path d="M12 3c0 4-4 5-4 9a4 4 0 0 0 8 0c0-2-1-3-1-3 2 1 3 3 3 5a6 6 0 1 1-12 0c0-5 6-7 6-11z"/></svg></span>
        <span><span class="t">Circuit Day</span><span class="s">Warm-up + 5-station auto circuit · hands-free</span></span>
      </button>
      <button class="card-btn" id="goCardio">
        <span class="ico wave"><svg viewBox="0 0 24 24" fill="none" stroke="#10171a" stroke-width="2" stroke-linecap="round"><path d="M2 12c2.5 0 2.5-5 5-5s2.5 10 5 10 2.5-5 5-5 2.5 2 5 2"/></svg></span>
        <span><span class="t">Cardio Day</span><span class="s">Steady or intervals · jump rope or low-impact</span></span>
      </button>
    </div>
    <p class="foot"><b>The rule:</b> end every station with 2–3 reps still in you. Foot acting up? Keep cardio low-impact — bike, row, swim, or extra swings.</p>`;
  document.getElementById('goCircuit').onclick=()=>{ ensureAudio(); renderCircuitSetup(); };
  document.getElementById('goCardio').onclick=()=>{ ensureAudio(); renderCardioSetup(); };
}

/* ---------------- CIRCUIT SETUP ---------------- */
function renderCircuitSetup(){
  state.screen='circuit-setup'; stopTimer();
  const roundChips=[3,4,5].map(r=>`<button class="chip ${state.rounds===r?'on':''}" data-rounds="${r}">${r}</button>`).join('');
  const est=estimate(state.rounds);
  app.innerHTML=`
    <div class="topbar"><button class="back" id="backHome">← Back</button><div class="phase">Circuit</div></div>
    <div class="setup">
      <h2>Circuit Day</h2>
      <p class="note">Both of you, one bell each, moving through the stations together. It runs start to finish on its own — just keep up.</p>
      <div class="lbl">Rounds</div><div class="chips">${roundChips}</div>
      <div class="lbl">Voice call-outs</div>
      <div class="seg"><button data-voice="on" class="${state.voice?'on':''}">On</button><button data-voice="off" class="${!state.voice?'on':''}">Off</button></div>
      <div class="plan">
        <div class="r"><span class="n">Swing · Squat · Get-up · Press · Row</span><span class="d">×${state.rounds}</span></div>
        <div class="r"><span class="n">Work / transition</span><span class="d">50s / 15s</span></div>
        <div class="r"><span class="n">Get-up station</span><span class="d">75s</span></div>
        <div class="r"><span class="n">Rest between rounds</span><span class="d">60s</span></div>
        <div class="r"><span class="n">Total with warm-up</span><span class="d">~${est} min</span></div>
      </div>
      <div class="controls" style="margin-top:24px;"><button class="btn primary wide" id="startCircuit">Start →</button></div>
    </div>`;
  document.getElementById('backHome').onclick=renderHome;
  app.querySelectorAll('[data-rounds]').forEach(b=>b.onclick=()=>{ state.rounds=+b.dataset.rounds; renderCircuitSetup(); });
  app.querySelectorAll('[data-voice]').forEach(b=>b.onclick=()=>{ state.voice=b.dataset.voice==='on'; renderCircuitSetup(); });
  document.getElementById('startCircuit').onclick=()=>{ ensureAudio(); speak('Warm up'); keepAwake(); startCircuit(); };
}
function estimate(rounds){
  let s=WARMUP.reduce((a,w)=>a+w.sec,0)+5;
  const roundWork=CIRCUIT.reduce((a,c)=>a+c.work,0)+(CIRCUIT.length-1)*TRANSITION;
  s+=rounds*roundWork+(rounds-1)*ROUNDREST;
  return Math.round(s/60);
}

/* ---------------- BUILD TIMELINE ---------------- */
function buildTimeline(rounds){
  const tl=[];
  WARMUP.forEach(w=>tl.push({kind:'warmup',name:w.name,sec:w.sec,cue:w.cue,say:w.say,steel:false,group:'Warm-up'}));
  tl.push({kind:'ready',sec:5,steel:false,say:'Get ready',group:'Get set',nextName:CIRCUIT[0].name});
  for(let r=1;r<=rounds;r++){
    CIRCUIT.forEach((s,i)=>{
      tl.push({kind:'work',name:s.name,sec:s.work,cue:s.cue,guide:s.guide,say:s.say,steel:false,
        group:`Round ${r} / ${rounds}`,station:i+1,stations:CIRCUIT.length});
      const last=i===CIRCUIT.length-1;
      if(!last){ const nx=CIRCUIT[i+1];
        tl.push({kind:'transition',sec:TRANSITION,steel:true,nextName:nx.name,cue:nx.cue,say:`Next, ${nx.say}`,
          group:`Round ${r} / ${rounds}`,station:i+1,stations:CIRCUIT.length}); }
      else if(r<rounds){
        tl.push({kind:'roundrest',sec:ROUNDREST,steel:true,nextName:CIRCUIT[0].name,say:`Rest. Round ${r+1} next`,group:`Round ${r} done`}); }
    });
  }
  return tl;
}
function startCircuit(){ state.screen='circuit'; state.timeline=buildTimeline(state.rounds); state.segIdx=0; runSegment(); }

/* ---------------- RUN SEGMENT (auto) ---------------- */
function runSegment(){
  const tl=state.timeline, seg=tl[state.segIdx];
  if(!seg) return renderCircuitDone();
  renderSeg(seg);
  speak(seg.say);
  seg.steel?beepRest():beepGo();
  const num=document.getElementById('bigNum');
  setRing(1,seg.steel);
  startTimer(seg.sec,(rem,total)=>{ if(num)num.textContent=fmt(rem); setRing(rem/total,seg.steel); },
    ()=>{ state.segIdx++; runSegment(); });
}
function renderSeg(seg){
  const tl=state.timeline, pct=(state.segIdx/tl.length)*100;
  let name='',target='',cue='',sub='',dots='';
  if(seg.kind==='warmup'){ name=seg.name; target='Warm-up'; cue=seg.cue; sub='warm-up'; }
  else if(seg.kind==='ready'){ name='Get ready'; target='First up: '+seg.nextName; cue=''; sub='get set'; }
  else if(seg.kind==='work'){ name=seg.name; target=seg.guide+' · leave 2–3 in reserve'; cue=seg.cue; sub='work';
    dots=Array.from({length:seg.stations},(_,i)=>`<span class="dot ${i+1<seg.station?'done':''} ${i+1===seg.station?'cur done':''}"></span>`).join(''); }
  else if(seg.kind==='transition'){ name=seg.nextName; target='Up next'; cue=seg.cue; sub='switch';
    dots=Array.from({length:seg.stations},(_,i)=>`<span class="dot ${i+1<=seg.station?'done':''}"></span>`).join(''); }
  else if(seg.kind==='roundrest'){ name='Round rest'; target='Next: '+seg.nextName; cue='Shake it out, breathe.'; sub='rest'; }
  const steel=!!seg.steel;
  app.innerHTML=`
    <div class="topbar"><button class="back" id="backHome">← End</button><div class="phase">${seg.group}</div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="stage">
      <div class="ring-box">${ringSVG()}<div class="ring-center"><div class="ring-num" id="bigNum">${seg.sec}</div><div class="ring-sub">${sub}</div></div></div>
      <div class="ex-name">${name}</div>
      <div class="ex-target ${steel?'steel':''}">${target}</div>
      <div class="ex-cue">${cue}</div>
      ${dots?`<div class="dots">${dots}</div>`:''}
    </div>
    <div class="controls"><div class="row">
      <button class="btn ghost" id="pauseBtn">Pause</button>
      <button class="btn ${steel?'steel':'primary'}" id="skipBtn">Skip →</button>
    </div></div>`;
  document.getElementById('backHome').onclick=()=>{ stopTimer(); try{speechSynthesis.cancel();}catch(e){} renderHome(); };
  document.getElementById('pauseBtn').onclick=e=>{ const p=pauseTimer(); e.target.textContent=p?'Resume':'Pause'; };
  document.getElementById('skipBtn').onclick=()=>{ stopTimer(); state.segIdx++; runSegment(); };
}
function renderCircuitDone(){
  state.screen='done'; stopTimer(); releaseAwake(); beepDone(); speak('Done. Nice work');
  app.innerHTML=`
    <div class="stage" style="justify-content:center;text-align:center;">
      <div class="ring-box">${ringSVG()}<div class="ring-center"><div class="ring-num" style="font-size:3.4rem;">DONE</div><div class="ring-sub">nice work</div></div></div>
      <div class="ex-name" style="margin-top:18px;">${state.rounds} rounds, done.</div>
      <div class="ex-cue">You left something in the tank — that's the point. Rack the bells, hydrate, back at it tomorrow.</div>
    </div>
    <div class="controls"><button class="btn primary wide" id="home2">Back to start</button></div>`;
  setRing(1,false);
  document.getElementById('home2').onclick=renderHome;
}

/* ---------------- CARDIO ---------------- */
function renderCardioSetup(){
  state.screen='cardio-setup'; stopTimer();
  const minChips=[10,15,20,25,30].map(m=>`<button class="chip ${state.cMin===m?'on':''}" data-min="${m}">${m}</button>`).join('');
  const workChips=[20,30,45,60].map(s=>`<button class="chip ${state.cWork===s?'on':''}" data-work="${s}">${s}s</button>`).join('');
  const restChips=[15,20,30].map(s=>`<button class="chip ${state.cRest===s?'on':''}" data-rest="${s}">${s}s</button>`).join('');
  const roundChips=[6,8,10,12].map(r=>`<button class="chip ${state.cRounds===r?'on':''}" data-rounds="${r}">${r}</button>`).join('');
  app.innerHTML=`
    <div class="topbar"><button class="back" id="backHome">← Back</button><div class="phase">Cardio</div></div>
    <div class="setup">
      <h2>Cardio Day</h2>
      <p class="note">Jump rope shines here. Sore foot? Swap in the bike, rower, a swim, or extra swings — keep it off the foot.</p>
      <div class="seg"><button data-type="steady" class="${state.cardioType==='steady'?'on':''}">Steady</button><button data-type="intervals" class="${state.cardioType==='intervals'?'on':''}">Intervals</button></div>
      <div id="steadyOpts" class="${state.cardioType==='steady'?'':'hidden'}"><div class="lbl">Minutes</div><div class="chips">${minChips}</div></div>
      <div id="intOpts" class="${state.cardioType==='intervals'?'':'hidden'}">
        <div class="lbl">Work</div><div class="chips">${workChips}</div>
        <div class="lbl">Rest</div><div class="chips">${restChips}</div>
        <div class="lbl">Rounds</div><div class="chips">${roundChips}</div></div>
      <div class="controls" style="margin-top:26px;"><button class="btn steel wide" id="startCardio">Start →</button></div>
    </div>`;
  document.getElementById('backHome').onclick=renderHome;
  app.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{ state.cardioType=b.dataset.type; renderCardioSetup(); });
  app.querySelectorAll('[data-min]').forEach(b=>b.onclick=()=>{ state.cMin=+b.dataset.min; renderCardioSetup(); });
  app.querySelectorAll('[data-work]').forEach(b=>b.onclick=()=>{ state.cWork=+b.dataset.work; renderCardioSetup(); });
  app.querySelectorAll('[data-rest]').forEach(b=>b.onclick=()=>{ state.cRest=+b.dataset.rest; renderCardioSetup(); });
  app.querySelectorAll('[data-rounds]').forEach(b=>b.onclick=()=>{ state.cRounds=+b.dataset.rounds; renderCardioSetup(); });
  document.getElementById('startCardio').onclick=()=>{ ensureAudio(); keepAwake(); state.cardioType==='steady'?startSteady():startIntervals(); };
}
function cardioShell(title,target){ return `
  <div class="topbar"><button class="back" id="backHome">← End</button><div class="phase">Cardio</div></div>
  <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
  <div class="stage"><div class="ring-box">${ringSVG()}<div class="ring-center"><div class="ring-num" id="bigNum">0</div><div class="ring-sub" id="bigSub">go</div></div></div>
    <div class="ex-name" id="exName">${title}</div><div class="ex-target" id="exTarget">${target}</div></div>
  <div class="controls"><div class="row"><button class="btn ghost" id="pauseBtn">Pause</button><button class="btn steel" id="stopBtn">Finish</button></div></div>`; }
function startSteady(){ state.screen='cardio'; const total=state.cMin*60;
  app.innerHTML=cardioShell('Steady','Keep a pace you can hold'); bindCardioBack();
  const num=document.getElementById('bigNum'); setRing(1,false); beepGo(); speak('Go');
  startTimer(total,(rem,t)=>{ num.textContent=fmt(rem); setRing(rem/t,false); document.getElementById('bigSub').textContent='remaining'; },()=>{ beepDone(); speak('Done'); renderCardioDone(); });
  document.getElementById('pauseBtn').onclick=e=>{ const p=pauseTimer(); e.target.textContent=p?'Resume':'Pause'; };
  document.getElementById('stopBtn').onclick=()=>{ stopTimer(); renderCardioDone(); };
}
function startIntervals(){ state.screen='cardio'; state.cRound=1; state.cPhase='work';
  app.innerHTML=cardioShell('Round 1 / '+state.cRounds,'Work'); bindCardioBack(); runIntervalPhase();
  document.getElementById('pauseBtn').onclick=e=>{ const p=pauseTimer(); e.target.textContent=p?'Resume':'Pause'; };
  document.getElementById('stopBtn').onclick=()=>{ stopTimer(); renderCardioDone(); };
}
function runIntervalPhase(){
  const work=state.cPhase==='work', dur=work?state.cWork:state.cRest;
  const num=document.getElementById('bigNum'),sub=document.getElementById('bigSub'),name=document.getElementById('exName'),tgt=document.getElementById('exTarget');
  name.textContent=`Round ${state.cRound} / ${state.cRounds}`; tgt.textContent=work?'Work':'Rest'; tgt.classList.toggle('steel',!work); sub.textContent=work?'work':'rest';
  work?beepGo():beepRest(); speak(work?'Work':'Rest');
  startTimer(dur,(rem,t)=>{ num.textContent=fmt(rem); setRing(rem/t,!work); },()=>{
    if(work){ state.cPhase='rest'; runIntervalPhase(); }
    else if(state.cRound>=state.cRounds){ beepDone(); speak('Done'); renderCardioDone(); }
    else { state.cRound++; state.cPhase='work'; runIntervalPhase(); } });
}
function renderCardioDone(){ state.screen='done'; stopTimer(); releaseAwake();
  app.innerHTML=`<div class="stage" style="justify-content:center;text-align:center;">
    <div class="ring-box">${ringSVG()}<div class="ring-center"><div class="ring-num" style="font-size:3.4rem;">DONE</div><div class="ring-sub">good work</div></div></div>
    <div class="ex-name" style="margin-top:18px;">Cardio logged.</div>
    <div class="ex-cue">That's the multiplier — strength plus cardio is where the big payoff lives.</div></div>
    <div class="controls"><button class="btn steel wide" id="home3">Back to start</button></div>`;
  setRing(1,true); document.getElementById('home3').onclick=renderHome;
}
function bindCardioBack(){ const b=document.getElementById('backHome'); if(b)b.onclick=()=>{ stopTimer(); try{speechSynthesis.cancel();}catch(e){} renderHome(); }; }

/* ---------------- BOOT ---------------- */
renderHome();
</script>
</body>
</html>
